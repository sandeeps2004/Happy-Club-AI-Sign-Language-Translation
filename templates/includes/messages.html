{% if messages %}
<div class="max-w-7xl mx-auto px-6 lg:px-10 pt-5 space-y-2">
    {% for message in messages %}
    <div x-data="{ show: true }" x-show="show"
         x-init="setTimeout(() => show = false, 5000)"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-2"
         class="hc-fade-up flex items-center justify-between gap-3 px-4 py-3 rounded-xl border
                {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800
                {% elif message.tags == 'error' %}bg-red-50 border-red-200 text-red-800
                {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
                {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}">
        <div class="flex items-center gap-2.5">
            <span class="w-1.5 h-1.5 rounded-full bg-current"></span>
            <span class="text-[13.5px] font-medium leading-snug">{{ message }}</span>
        </div>
        <button @click="show = false" class="flex-shrink-0 p-1 rounded-md text-current opacity-50 hover:opacity-100 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <path d="M6 18 18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
