{% extends "layouts/auth_base.html" %}

{% block title %}Reset Password — {{ APP_NAME }}{% endblock %}
{% block subtitle %}Enter your email to reset your password{% endblock %}

{% block content %}
<form method="post" class="space-y-5">
    {% csrf_token %}

    <div>
        <label for="id_email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Email address</label>
        <input type="email" name="email" id="id_email" required autofocus
               class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
               placeholder="you@example.com">
    </div>

    <button type="submit"
            class="w-full py-3 px-4 text-sm font-semibold text-white bg-primary-600 rounded-lg hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 transition shadow-sm">
        Send reset link
    </button>
</form>
{% endblock %}

{% block footer_links %}
    <a href="{% url 'login' %}" class="font-medium text-primary-600 dark:text-primary-400 hover:underline">Back to sign in</a>
{% endblock %}
